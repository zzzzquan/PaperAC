version: '3.8'

services:
  # 1. 数据库
  db:
    image: postgres:15-alpine
    container_name: aigc-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres} # 默认密码 postgres，生产环境请修改
      POSTGRES_DB: aigc_detector
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 自动应用初始化脚本
      - ./server/internal/store/migrations:/docker-entrypoint-initdb.d
    networks:
      - aigc-net

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: aigc-redis
    restart: always
    networks:
      - aigc-net

  # 3. 后端 API
  app-server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: aigc-server
    restart: always
    depends_on:
      - db
      - redis
    environment:
      # 在 Docker 网络中，主机名即服务名
      - DATABASE_DSN=postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/aigc_detector?sslmode=disable
      - REDIS_ADDR=redis:6379
      - MAILER_MODE=${MAILER_MODE:-mock} # 默认 mock，生产环境可改为 directmail
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - WORKER_CONCURRENCY=5
      # 如果配置了阿里云邮件，填入这里
      - ALIYUN_ACCESS_KEY=${ALIYUN_ACCESS_KEY}
      - ALIYUN_SECRET_KEY=${ALIYUN_SECRET_KEY}
    volumes:
      - app_uploads:/app/uploads
      - app_results:/app/results
      # 如果有本地字体文件，可以挂载进去
      # - ./server/assets/fonts:/app/assets/fonts
    networks:
      - aigc-net

  # 4. 前端 (Nginx)
  app-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: aigc-web
    restart: always
    depends_on:
      - app-server
    ports:
      - "80:80"
      # - "443:443" # 如果配置了 SSL
    networks:
      - aigc-net

volumes:
  postgres_data:
  redis_data:
  app_uploads:
  app_results:

networks:
  aigc-net:
    driver: bridge
