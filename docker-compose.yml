version: '3.8'

services:
  # 1. 数据库 (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: aigc-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: aigc_detector
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 自动应用初始化脚本
      - ./server/internal/store/migrations:/docker-entrypoint-initdb.d
    networks:
      - aigc-net

  # 2. Redis - 已移除 (Serverless 架构不需要)

  # 3. 后端 API
  app-server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: aigc-server
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_DSN=postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/aigc_detector?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-me-in-prod}
      - MAILER_MODE=${MAILER_MODE:-mock}
      - UPLOAD_DIR=/app/uploads
      - RESULT_DIR=/app/results
      - WORKER_CONCURRENCY=5
      # 阿里云 DirectMail 配置
      - ALIYUN_ACCESS_KEY=${ALIYUN_ACCESS_KEY}
      - ALIYUN_SECRET_KEY=${ALIYUN_SECRET_KEY}
      - DM_ACCOUNT_NAME=${DM_ACCOUNT_NAME}
      - DM_FROM_ALIAS=${DM_FROM_ALIAS}
    volumes:
      - app_uploads:/app/uploads
      - app_results:/app/results
    networks:
      - aigc-net

  # 4. 前端 (Nginx)
  app-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: aigc-web
    restart: always
    depends_on:
      - app-server
    ports:
      - "80:80"
    networks:
      - aigc-net

volumes:
  postgres_data:
  app_uploads:
  app_results:

networks:
  aigc-net:
    driver: bridge
